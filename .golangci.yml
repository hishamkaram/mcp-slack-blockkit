# golangci-lint v2 config — research.md §A.5 baseline.
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - misspell
    - gosec

  settings:
    gosec:
      # G304 (file path from variable): false-positive heavy in test code.
      # We don't read user-controlled file paths in production code.
      excludes:
        - G304
    revive:
      severity: warning

  exclusions:
    rules:
      # Tests get more leeway: assertion-style _ assignments, longer lines,
      # repeated string literals, etc. are conventional in Go test code.
      - path: _test\.go
        linters: [errcheck, gosec, gocritic]

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
