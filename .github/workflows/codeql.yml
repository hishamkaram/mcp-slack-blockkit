name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Monday 04:27 UTC. Off-hours, off-peak.
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Go is compiled — autobuild is correct here. `none` mode would skip analysis.
          - language: go
            build-mode: autobuild

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality is the strictest query suite — appropriate
          # for a security-relevant project (mention sanitization).
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
