name: Bug report
description: Something doesn't work the way it should.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the
        sections below — the more detail, the faster a fix lands.

        For **security vulnerabilities**, do NOT open a public issue.
        Use [Private Vulnerability Reporting](../../security/advisories/new)
        instead.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `mcp-slack-blockkit --version`.
      placeholder: "v0.1.0 (commit abc1234, built 2026-05-09)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client (or CLI)
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - Continue.dev
        - Zed
        - Cline
        - CLI (`mcp-slack-blockkit convert`)
        - Other / library import
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What behavior you were expecting instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce. Include the exact markdown input if possible.
      placeholder: |
        1. Run `echo '...' | mcp-slack-blockkit convert --mode rich_text`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from stderr (set `--log-level=debug` for verbose).
      render: shell
